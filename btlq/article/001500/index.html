<head>

    <meta property="og:type" content="article" />
    <meta property="og:title" content="創世から130年 — セツの誕生（聖書年表の最初の基準点）" />

</head>
<body>
    <div class="container">
        <button class="top-btn home-btn" type="button" id="homeBtn" title="Home">
            <svg width="22" height="22" viewBox="0 0 24 24" style="display:block;">
                <path d="M12 3.2 3 10.3V21a1 1 0 0 0 1 1h5v-7h6v7h5a1 1 0 0 0 1-1V10.3l-9-7.1z" fill="currentColor" />
            </svg>
        </button>
        <button class="top-btn lang-switch" type="button" id="langBtn" title="Language">EN</button>
        <div class="article-wrapper">
            <div class="header-icon-box"><span class="material-icons header-icon">article</span></div>
            <h1 id="article-title" data-ja="創世から130年 — セツの誕生（聖書年表の最初の基準点）" data-en="Year 130 from Creation — The Birth of Seth (The First Fixed Point in Biblical Chronology)">創世から130年 — セツの誕生（聖書年表の最初の基準点）</h1>
            <article class="article-body">
                <div data-ja="" data-en="Genesis 5 indicates that Adam fathered Seth at a specified age. In the Masoretic textual tradition, that age is 130 years. This constitutes the first explicit chronological datum in Scripture and marks the starting point of the Bible’s internal chronological framework. From this point onward, the genealogy is structured by consistently recording the age of each patriarch at the birth of his successor, allowing a cumulative calculation down to the Flood."></div>
                <div data-ja="創世記5章によれば、アダムは130歳でセツをもうけたとされる。これは聖書中で最初に明示される年代データであり、聖書内部の年表構築の出発点となる。以降、各族長が後継者をもうけた年齢が一貫して記録されており、洪水までの累積計算が可能となる。" data-en="The same genealogical line is reflected in 1 Chronicles and in the Gospel of Luke, demonstrating that Seth’s lineage was understood as the continuous and authoritative line of descent. Genesis 7 provides Noah’s age at the time of the Flood, which enables a total calculation from creation to the Flood. Following the Masoretic Text, this yields a total of 1,656 years."></div>
                <div data-ja="この系譜は歴代誌上やルカ福音書にも反映されており、セツの系統が正統な血統として理解されていたことが分かる。創世記7章はノアの洪水時の年齢も記しており、創世から洪水までの合計年数を算出できる。マソラ本文に従えば、その合計は1,656年となる。" data-en="However, the numerical data vary across textual traditions. The Septuagint records Adam’s age at Seth’s birth as 230 years rather than 130, which extends the pre-Flood total by several centuries. The Samaritan Pentateuch preserves yet another numerical scheme. Modern critical editions of the Hebrew Bible, such as Biblia Hebraica Stuttgartensia and Biblia Hebraica Quinta, are based on the Masoretic tradition."></div>
                <div data-ja="ただし、この数値は写本伝承によって異なる。七十人訳聖書（LXX）ではアダムがセツをもうけた年齢は130歳ではなく230歳とされ、洪水前の合計年数が数百年延びる。サマリア五書はさらに異なる数値体系を持つ。現代の批判校訂版（BHSやBHQ）はマソラ本文に基づいている。" data-en="Accordingly, while the birth of Seth represents the earliest internally fixed chronological anchor in Scripture, the absolute calculation depends on which textual tradition is adopted."></div>
                <div data-ja="このように、セツの誕生は聖書内部で最初に固定される年代的アンカーだが、絶対年代の計算はどの伝承を採用するかによって異なる。" data-en=""></div>
            </article>
        </div>
    </div>
    <script>
        // 言語切替（ゲーム本体と同じ仕組み）
        function toggleLang() {
            var lang = document.documentElement.lang === 'ja' ? 'en' : 'ja';
            document.documentElement.lang = lang;
            document.getElementById('langBtn').innerText = lang === 'ja' ? 'EN' : 'JA';
            document.querySelectorAll('[data-ja]').forEach(function(el) {
                el.innerText = el.getAttribute('data-' + lang);
            });
            document.querySelectorAll('[data-en]').forEach(function(el) {
                if(el.hasAttribute('data-ja')) return; // 2重適用防止
                el.innerText = el.getAttribute('data-' + lang);
            });
        }
        document.getElementById('langBtn').onclick = toggleLang;
        // 初期表示
        window.onload = function() {
            var lang = localStorage.getItem('lang') || (navigator.language && navigator.language.startsWith('ja') ? 'ja' : 'en');
            document.documentElement.lang = lang;
            document.getElementById('langBtn').innerText = lang === 'ja' ? 'EN' : 'JA';
            document.querySelectorAll('[data-ja]').forEach(function(el) {
                el.innerText = el.getAttribute('data-' + lang);
            });
            document.querySelectorAll('[data-en]').forEach(function(el) {
                if(el.hasAttribute('data-ja')) return;
                el.innerText = el.getAttribute('data-' + lang);
            });
        };
        // HOMEボタン
        document.getElementById('homeBtn').onclick = function() {
            location.href = '/btlq/';
        };
    </script>
    <script>
        fetch('../../../../parts/footer.html')
            .then(r => r.text())
            .then(html => {
                document.body.insertAdjacentHTML('beforeend', html);
            });
    </script>
</body>
</html>
