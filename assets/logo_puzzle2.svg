<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Design: Single-line text with puzzle icon -->
  <defs>
    <linearGradient id="textGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4d6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Compact puzzle icon -->
  <g transform="translate(12, 18)">
    <path d="M2,2 h8 v3 a2.5,2.5 0 0,0 5,0 v-3 h8 v8 h-3 a2.5,2.5 0 0,0 0,5 h3 v8 h-8 v-3 a2.5,2.5 0 0,0 -5,0 v3 h-8 v-8 h3 a2.5,2.5 0 0,0 0,-5 h-3 z" 
          fill="url(#textGrad2)" stroke="#1e4d6b" stroke-width="1.5"/>
  </g>
  
  <!-- ARQ GAMES in single line with better balance -->
  <text x="45" y="37" font-family="Arial, sans-serif" font-weight="900" fill="#1e4d6b" letter-spacing="1">
    <tspan font-size="24">ARQ</tspan>
    <tspan font-size="18" dx="8" fill="#5dade2" letter-spacing="2">GAMES</tspan>
  </text>
</svg>
