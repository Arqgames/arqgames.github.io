<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Design: Puzzle pieces forming a square logo with balanced text -->
  <defs>
    <linearGradient id="puzzleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a90c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4d6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Puzzle pieces forming a square -->
  <g transform="translate(10, 15)">
    <!-- Top-left piece -->
    <path d="M2,2 h12 v6 a3,3 0 0,1 -6,0 a3,3 0 0,1 6,0 v-6 h-12 v12 h6 a3,3 0 0,1 0,6 a3,3 0 0,1 0,-6 h-6 v-12" 
          fill="#5dade2" stroke="#1e4d6b" stroke-width="1.5"/>
    <!-- Top-right piece -->
    <path d="M14,2 h12 v12 h-6 a3,3 0 0,0 0,6 a3,3 0 0,0 0,-6 h6 v-12 h-12 v6 a3,3 0 0,0 -6,0 a3,3 0 0,0 6,0" 
          fill="#4a90c5" stroke="#1e4d6b" stroke-width="1.5"/>
    <!-- Bottom-left piece -->
    <path d="M2,14 h6 a3,3 0 0,1 0,6 a3,3 0 0,1 0,-6 h-6 v12 h12 v-6 a3,3 0 0,1 6,0 a3,3 0 0,1 -6,0 v6 h-12" 
          fill="#4a90c5" stroke="#1e4d6b" stroke-width="1.5"/>
    <!-- Bottom-right piece -->
    <path d="M14,14 h6 a3,3 0 0,0 0,6 a3,3 0 0,0 0,-6 h6 v12 h-12 v-6 a3,3 0 0,0 6,0 a3,3 0 0,0 -6,0" 
          fill="#1e4d6b" stroke="#1e4d6b" stroke-width="1.5"/>
  </g>
  
  <!-- ARQ text - moderate size -->
  <text x="55" y="32" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#1e4d6b" letter-spacing="2">
    ARQ
  </text>
  
  <!-- GAMES text - larger, better balance -->
  <text x="55" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#5dade2" letter-spacing="4">
    GAMES
  </text>
</svg>
