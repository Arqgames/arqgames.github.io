<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" width="280" height="50">
  <!-- Single color, one-line logo with puzzle-integrated A -->
  <g fill="#1e4d6b">
    <!-- "A" as puzzle piece - left part -->
    <path d="M12,38 L18,18 L24,38 L21,38 L20,32 L16,32 L15,38 Z M17,28 h2 l-1,-6 Z" 
          stroke="#1e4d6b" stroke-width="0.5"/>
    <!-- Puzzle knob on A -->
    <circle cx="18" cy="16" r="2" fill="#fff"/>
    <circle cx="18" cy="16" r="1.5"/>
    
    <!-- RQ text -->
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="1">RQ</text>
    
    <!-- Spacing -->
    <text x="82" y="38" font-family="Arial, sans-serif" font-size="28" font-weight="300">•</text>
    
    <!-- GAMES text -->
    <text x="100" y="38" font-family="Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="2">GAMES</text>
  </g>
</svg>
