<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Design 2: 3D Ark with Depth -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4d6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arkFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90c5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 3D Ark Icon -->
  <g transform="translate(5, 10)">
    <!-- Bottom hull -->
    <path d="M4,28 L2,32 L30,32 L28,28 Z" fill="#2d5a7b"/>
    <!-- Main cabin - front face -->
    <rect x="6" y="16" width="18" height="12" fill="url(#arkFill)" stroke="#1e4d6b" stroke-width="1.5"/>
    <!-- Side face (3D effect) -->
    <path d="M24,16 L30,12 L30,24 L24,28 Z" fill="#4a90c5" stroke="#1e4d6b" stroke-width="1"/>
    <!-- Roof front -->
    <path d="M4,16 L15,8 L26,16 Z" fill="#1e4d6b"/>
    <!-- Roof side (3D) -->
    <path d="M26,16 L15,8 L21,5 L32,13 Z" fill="#2d5a7b"/>
    <!-- Windows -->
    <rect x="10" y="20" width="4" height="4" fill="#e3f2fd"/>
    <rect x="16" y="20" width="4" height="4" fill="#e3f2fd"/>
    <!-- Door -->
    <rect x="12" y="24" width="3" height="4" fill="#c4e0f5"/>
  </g>
  
  <!-- ARQ text -->
  <text x="45" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="url(#grad2)" letter-spacing="2">
    ARQ
  </text>
  
  <!-- GAMES text -->
  <text x="45" y="51" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1e4d6b" letter-spacing="3">
    GAMES
  </text>
  
  <!-- Decorative waves -->
  <circle cx="120" cy="28" r="1.5" fill="#5dade2" opacity="0.5"/>
  <circle cx="127" cy="28" r="1.5" fill="#5dade2" opacity="0.4"/>
  <circle cx="134" cy="28" r="1.5" fill="#5dade2" opacity="0.3"/>
</svg>
