<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Background -->
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4d6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Puzzle piece icon -->
  <g transform="translate(8, 15)">
    <path d="M2,2 h10 v4 a3,3 0 0,0 6,0 v-4 h10 v10 h-4 a3,3 0 0,0 0,6 h4 v10 h-10 v-4 a3,3 0 0,0 -6,0 v4 h-10 v-10 h4 a3,3 0 0,0 0,-6 h-4 z" 
          fill="#5dade2" stroke="#1e4d6b" stroke-width="1.5"/>
  </g>
  
  <!-- ARQ text - large and bold -->
  <text x="42" y="35" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" fill="url(#textGrad)" letter-spacing="2">
    ARQ
  </text>
  
  <!-- Games text - smaller -->
  <text x="42" y="51" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#1e4d6b" letter-spacing="3">
    GAMES
  </text>
  
  <!-- Decorative dots -->
  <circle cx="118" cy="26" r="2" fill="#5dade2" opacity="0.6"/>
  <circle cx="125" cy="26" r="2" fill="#5dade2" opacity="0.4"/>
  <circle cx="132" cy="26" r="2" fill="#5dade2" opacity="0.2"/>
</svg>
