<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Design 3: Abstract Geometric Ark -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4d6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Geometric Ark Icon -->
  <g transform="translate(8, 12)">
    <!-- Base trapezoid (hull) -->
    <path d="M8,28 L4,32 L28,32 L24,28 Z" fill="#1e4d6b"/>
    <!-- Stacked boxes (cargo/levels) -->
    <rect x="7" y="22" width="18" height="6" fill="#5dade2" stroke="#1e4d6b" stroke-width="1.5"/>
    <rect x="9" y="16" width="14" height="6" fill="#4a90c5" stroke="#1e4d6b" stroke-width="1.5"/>
    <rect x="11" y="10" width="10" height="6" fill="#5dade2" stroke="#1e4d6b" stroke-width="1.5"/>
    <!-- Top triangle (roof peak) -->
    <path d="M13,10 L16,6 L19,10 Z" fill="#1e4d6b"/>
    <!-- Window details -->
    <circle cx="16" cy="19" r="1.5" fill="#e3f2fd"/>
    <circle cx="16" cy="25" r="1.5" fill="#e3f2fd"/>
  </g>
  
  <!-- ARQ text -->
  <text x="45" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="url(#grad3)" letter-spacing="2">
    ARQ
  </text>
  
  <!-- GAMES text -->
  <text x="45" y="51" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1e4d6b" letter-spacing="3">
    GAMES
  </text>
  
  <!-- Geometric decoration -->
  <rect x="120" y="26" width="4" height="4" fill="#5dade2" opacity="0.6" transform="rotate(45 122 28)"/>
  <rect x="128" y="26" width="3" height="3" fill="#5dade2" opacity="0.4" transform="rotate(45 129.5 27.5)"/>
  <rect x="135" y="26" width="2" height="2" fill="#5dade2" opacity="0.3" transform="rotate(45 136 27)"/>
</svg>
