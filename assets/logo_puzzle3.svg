<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Design: Interlocking puzzle pieces with balanced stacked text -->
  <defs>
    <linearGradient id="piece1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90c5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="piece2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4d6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Three interlocking puzzle pieces -->
  <g transform="translate(8, 14)">
    <!-- Left piece -->
    <path d="M2,8 h8 v4 a3,3 0 0,0 6,0 v-4 h2 v14 h-2 v-4 a3,3 0 0,0 -6,0 v4 h-8 v-14" 
          fill="url(#piece1)" stroke="#1e4d6b" stroke-width="1.5"/>
    <!-- Middle piece -->
    <path d="M18,6 h8 v4 a3,3 0 0,0 6,0 v-4 h2 v18 h-2 v-4 a3,3 0 0,0 -6,0 v4 h-8 v-18" 
          fill="url(#piece2)" stroke="#1e4d6b" stroke-width="1.5"/>
    <!-- Right piece -->
    <path d="M34,8 h8 v14 h-8 v-4 a3,3 0 0,0 -6,0 v4 h-2 v-14 h2 v4 a3,3 0 0,0 6,0 v-4" 
          fill="url(#piece1)" stroke="#1e4d6b" stroke-width="1.5"/>
  </g>
  
  <!-- ARQ text - balanced size -->
  <text x="58" y="31" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#1e4d6b" letter-spacing="3">
    ARQ
  </text>
  
  <!-- GAMES text - similar visual weight -->
  <text x="58" y="49" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#5dade2" letter-spacing="5">
    GAMES
  </text>
</svg>
