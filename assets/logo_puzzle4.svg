<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Design: Circular puzzle arrangement with centered text -->
  <defs>
    <radialGradient id="circleGrad">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4d6b;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Circular puzzle pieces -->
  <g transform="translate(20, 30)">
    <circle cx="0" cy="0" r="12" fill="#5dade2" stroke="#1e4d6b" stroke-width="1.5"/>
    <!-- Cut-out -->
    <circle cx="-8" cy="-8" r="4" fill="#1e4d6b"/>
    <circle cx="8" cy="-8" r="4" fill="#1e4d6b"/>
    <circle cx="-8" cy="8" r="4" fill="#5dade2"/>
    <circle cx="8" cy="8" r="4" fill="#5dade2"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#1e4d6b"/>
  </g>
  
  <!-- ARQ and GAMES with equal visual weight -->
  <text x="50" y="28" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#1e4d6b" letter-spacing="3">
    ARQ
  </text>
  <text x="50" y="46" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5dade2" letter-spacing="4">
    GAMES
  </text>
</svg>
