<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARQ Games Logo Candidates</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e3f2fd;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #1e4d6b;
            text-align: center;
        }
        .logo-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .logo-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(30, 77, 107, 0.2);
            text-align: center;
        }
        .logo-card h2 {
            color: #1e4d6b;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        .logo-card p {
            color: #5dade2;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .logo-preview {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .logo-preview img {
            width: 100%;
            height: auto;
            max-width: 240px;
        }
        .use-button {
            background: #5dade2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .use-button:hover {
            background: #42a5f5;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1>ARQ GAMES ロゴ - フォントバリエーション</h1>
    <p style="text-align: center; color: #1e4d6b;">案2ベース・Aを寄せて配置・5つのフォントスタイル</p>
    
    <div class="logo-container">
        <div class="logo-card">
            <h2>フォント1: Bold Sans-serif</h2>
            <p>Classic Bold Arial</p>
            <div class="logo-preview">
                <img src="/assets/logo_font1.svg" alt="Logo Font 1">
            </div>
            <button class="use-button" onclick="copyPath('logo_font1.svg')">このデザインを使用</button>
        </div>
        
        <div class="logo-card">
            <h2>フォント2: Rounded Friendly</h2>
            <p>Soft & Approachable</p>
            <div class="logo-preview">
                <img src="/assets/logo_font2.svg" alt="Logo Font 2">
            </div>
            <button class="use-button" onclick="copyPath('logo_font2.svg')">このデザインを使用</button>
        </div>
        
        <div class="logo-card">
            <h2>フォント3: Condensed</h2>
            <p>Narrow & Modern</p>
            <div class="logo-preview">
                <img src="/assets/logo_font3.svg" alt="Logo Font 3">
            </div>
            <button class="use-button" onclick="copyPath('logo_font3.svg')">このデザインを使用</button>
        </div>
        
        <div class="logo-card">
            <h2>フォント4: Tech/Geometric</h2>
            <p>Bold & Impactful</p>
            <div class="logo-preview">
                <img src="/assets/logo_font4.svg" alt="Logo Font 4">
            </div>
            <button class="use-button" onclick="copyPath('logo_font4.svg')">このデザインを使用</button>
        </div>
        
        <div class="logo-card">
            <h2>フォント5: Elegant Thin</h2>
            <p>Light & Sophisticated</p>
            <div class="logo-preview">
                <img src="/assets/logo_font5.svg" alt="Logo Font 5">
            </div>
            <button class="use-button" onclick="copyPath('logo_font5.svg')">このデザインを使用</button>
        </div>
    </div>
    
    <div style="margin-top: 40px; padding: 20px; background: white; border-radius: 8px; text-align: center;">
        <h3 style="color: #1e4d6b;">選択したファイル名:</h3>
        <p id="selected" style="font-family: monospace; color: #5dade2; font-size: 1.2em;">まだ選択されていません</p>
    </div>
    
    <script>
        function copyPath(filename) {
            document.getElementById('selected').textContent = filename;
            alert('選択: ' + filename + '\n\nこのファイル名を開発者に伝えてください！');
        }
    </script>
</body>
</html>
